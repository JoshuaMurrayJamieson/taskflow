  .budget-body { align-items:center; }
  .budget-content { max-width:1000px; width:100%; margin:0 auto; padding:0 4px; }

  /* Toast */
  #toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px);
    background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-sm);
    padding:8px 16px; font-size:13px; color:var(--text); font-weight:600;
    opacity:0; transition:all 0.25s ease; z-index:9999;
    box-shadow:var(--shadow); pointer-events:none;
  }

  /* Sync status */
  #syncStatus {
    font-size:11px; font-weight:600; color:var(--low);
    display:flex; align-items:center; gap:4px; font-family:'JetBrains Mono',monospace;
  }
  </style>
</head>
<body>

<!-- Login gate -->
<div id="loginGate" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;width:340px;text-align:center">

    <div style="font-size:13px;color:var(--text3);margin-bottom:24px">Sign in with your TaskFlow credentials</div>

    <button class="btn-primary" onclick="budgetLogin()" style="width:100%">Sign In</button>
    <div style="margin-top:12px"><a href="/" style="font-size:12px;color:var(--text3)">← Back to TaskFlow</a></div>
  </div>
</div>

<div id="budgetApp" style="display:none;height:100vh;flex-direction:column">

    <a href="/" style="color:var(--text3);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:4px;flex-shrink:0" title="Back to TaskFlow">
      <i class="fa-solid fa-arrow-left" style="font-size:12px"></i>
    </a>
    <div style="font-family:'DM Serif Display',serif;font-size:22px;color:var(--low);display:flex;align-items:center;gap:8px;flex:1">
      <i class="fa-solid fa-wallet"></i> Budget
    </div>
    <div id="syncStatus" style="font-size:11px;font-weight:600;color:var(--low);display:flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace"></div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)">
      Pay date: <input id="fortnightStartDay" type="number" min="1" max="28" value="1"
        style="width:44px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);outline:none;text-align:center"
        onchange="saveFortnightStart()"> <span style="color:var(--text3)">then every 14 days</span>
    </div>
    <div class="budget-nav">
      <button class="budget-nav-btn active" onclick="setBudgetTab('overview');document.querySelectorAll('.budget-nav-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')"><i class="fa-solid fa-gauge" style="margin-right:4px"></i>Overview</button>
      <button class="budget-nav-btn" onclick="setBudgetTab('bills');document.querySelectorAll('.budget-nav-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')"><i class="fa-solid fa-receipt" style="margin-right:4px"></i>Bills</button>
      <button class="budget-nav-btn" onclick="setBudgetTab('savings');document.querySelectorAll('.budget-nav-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')"><i class="fa-solid fa-piggy-bank" style="margin-right:4px"></i>Savings</button>
      <button class="budget-nav-btn" onclick="setBudgetTab('debt');document.querySelectorAll('.budget-nav-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')"><i class="fa-solid fa-hand-holding-dollar" style="margin-right:4px"></i>Debt</button>
      <button class="budget-nav-btn" onclick="setBudgetTab('history');document.querySelectorAll('.budget-nav-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')"><i class="fa-solid fa-clock-rotate-left" style="margin-right:4px"></i>History</button>
    </div>
  </div>
  <div class="budget-body" id="budgetBody"></div>
</div>

<div id="toast"></div>

<!-- EMOJI PICKER — built once, shared, positioned absolutely -->
<div id="billEmojiPicker" style="display:none;position:fixed;z-index:9999;flex-wrap:wrap;gap:4px;padding:10px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);max-height:160px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.4);width:260px"></div>

<!-- All budget modals -->

<div class="modal-overlay" id="budgetIncomeModal" style="display:none" onclick="if(event.target===this)closeIncomeModal()">
  <div class="modal" style="width:400px">
    <div class="modal-title"><i class="fa-solid fa-arrow-trend-up" style="color:var(--low)"></i> Income Source</div>
    <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="incName" type="text" placeholder="e.g. Salary, Casual Work" onkeydown="if(event.key==='Enter')saveIncome()"></div>

<!-- BILL MODAL -->
<div class="modal-overlay" id="budgetBillModal" style="display:none" onclick="if(event.target===this)closeBillModal()">

        <button id="billTypeVariable" class="subtask-add-btn" style="flex:1;background:var(--bg3);border-color:var(--border);color:var(--text3)" onclick="setBillType('variable')">🛒 Variable / Envelope</button>

</div>

<!-- SAVINGS GOAL MODAL -->

<script>

// ── SHARED UTILITIES ─────────────────────────────────────────
const API_URL = 'https://9t3zmb9iij.execute-api.ap-southeast-2.amazonaws.com/tasks';

function uid() { return Math.random().toString(36).slice(2,11) + Date.now().toString(36); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getTodayDate() { return new Date().toISOString().split('T')[0]; }
function getUserId()   { return localStorage.getItem('wtm_username') || ''; }
function getAppSecret(){ return localStorage.getItem('wtm_secret')   || ''; }

let saveTimer = null;

function showToast(msg, duration=2800) {
  let t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.style.opacity = '1'; t.style.transform = 'translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(10px)'; }, duration);
}

function setSyncStatus(state, msg) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  const colors = { ok:'var(--low)', syncing:'var(--med)', error:'var(--high)', offline:'var(--text3)' };
  const icons  = { ok:'fa-cloud-arrow-up', syncing:'fa-rotate fa-spin', error:'fa-triangle-exclamation', offline:'fa-wifi-slash' };
  el.innerHTML = `<i class="fa-solid ${icons[state]||icons.ok}" style="font-size:11px"></i> ${msg}`;
  el.style.color = colors[state] || colors.ok;
}

async function pushToCloud() {
  setSyncStatus('syncing','Saving…');
  const now = new Date().toISOString();
  try {
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','X-User-Id':getUserId(),'X-App-Secret':getAppSecret()},
      body: JSON.stringify({
        tasks: JSON.parse(localStorage.getItem('wtm_tasks')||'[]'),
        archive: JSON.parse(localStorage.getItem('wtm_archive')||'[]'),
        semester: JSON.parse(localStorage.getItem('wtm_semester')||'[]'),
        courses: JSON.parse(localStorage.getItem('wtm_courses')||'[]'),
        projects: JSON.parse(localStorage.getItem('wtm_projects')||'[]'),
        templates: JSON.parse(localStorage.getItem('wtm_prog_templates')||'[]'),
        budget: budgetData,
        semPresets: JSON.parse(localStorage.getItem('wtm_sem_presets')||'{}'),
        semStart: localStorage.getItem('wtm_sem_start')||'',
        semEnd: localStorage.getItem('wtm_sem_end')||'',
        updatedAt: now
      })
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    localStorage.setItem('wtm_last_push', now);
    setSyncStatus('ok','Saved');
  } catch(e) {
    setSyncStatus('error','Save failed');
  }
}

async function loadBudgetFromCloud() {
  setSyncStatus('syncing','Loading…');
  try {
    const res = await fetch(API_URL, {
      method:'GET',
      headers:{'Content-Type':'application/json','X-User-Id':getUserId(),'X-App-Secret':getAppSecret()}
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if (data.budget && Object.keys(data.budget).length > 0) {
      budgetData = { ...budgetData, ...data.budget };
      localStorage.setItem('wtm_budget', JSON.stringify(budgetData));
    }
    setSyncStatus('ok','Synced');
  } catch(e) {
    setSyncStatus('offline','Offline — local data');
  }
  renderBudget();
  const inp = document.getElementById('fortnightStartDay');
  if (inp) inp.value = budgetData.fortnightStartDay || 1;
}


// ============================================================
// BUDGET APP
// ============================================================
let budgetData = {
  fortnightStartDay: 1,
  currentBalance: 0,          // current bank balance
  incomes: [],                // [{id, name, amount, color}]
  bills: [],                  // [{id, name, amount, type:'fixed'|'variable', dayOfMonth, nextDate, frequency:'monthly'|'quarterly'|'halfyearly'|'yearly'|'fortnightly', category, color, emoji}]
  savingsGoals: [],           // [{id, name, target, current, contribution, color}]
  allocations: [],            // [{id, name, percent, color}]
  transactions: [],           // [{id, date, name, amount, type:'income'|'expense', category}]
  debts: []                   // [{id, name, total, current, payPerFortnight, payments:[{id,date,amount,note}], color}]
};
try {
  const saved = JSON.parse(localStorage.getItem('wtm_budget') || 'null');
  if (saved) budgetData = { ...budgetData, ...saved };
} catch {}

let budgetTab = 'overview';   // overview | bills | allocations | history
let budgetModalMode = null;
let currentBillEdit = null;
let currentIncomeEdit = null;
let currentAllocEdit = null;

function saveBudget() {
  localStorage.setItem('wtm_budget', JSON.stringify(budgetData));
  clearTimeout(saveTimer);
  saveTimer = setTimeout(pushToCloud, 500);
}

function openBudget() {
  document.getElementById('budgetPage').classList.add('open');
  // Set saved pay date
  const inp = document.getElementById('fortnightStartDay');
  if (inp) inp.value = budgetData.fortnightStartDay || 1;
  renderBudget();
}
function closeBudget() {
  document.getElementById('budgetPage').classList.remove('open');
}
function setBudgetTab(tab) {
  budgetTab = tab;
  renderBudget();
}

// ── HELPERS ───────────────────────────────────────────────────
function fmtAUD(n) {
  return '$' + Math.abs(n).toLocaleString('en-AU', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function getTotalIncome() {
  return budgetData.incomes.reduce((a,i) => a + (parseFloat(i.amount)||0), 0);
}
function billPerFortnight(b) {
  const amt  = parseFloat(b.amount) || 0;
  const freq = b.frequency || 'monthly';
  if (freq === 'fortnightly')  return amt;
  if (freq === 'monthly')      return amt / 2;
  if (freq === 'quarterly')    return amt / 6;
  if (freq === 'halfyearly')   return amt / 13;
  if (freq === 'yearly')       return amt / 26;
  return amt / 2;
}

function getTotalBills() {
  return budgetData.bills.filter(b=>b.type!=='variable').reduce((a,b) => a + billPerFortnight(b), 0);
}
function getTotalVariable() {
  return budgetData.bills.filter(b=>b.type==='variable').reduce((a,b) => a + (parseFloat(b.amount)||0), 0);
}
function getTotalSavingsContrib() {
  return (budgetData.savingsGoals||[]).reduce((a,g) => a + (parseFloat(g.contribution)||0), 0);
}
function getFortnightDates() {
  const today = new Date();
  const start = new Date(today);
  // Find the most recent fortnight start
  const dom = today.getDate();
  const startDay = budgetData.fortnightStartDay || 1;
  if (dom >= startDay && dom < startDay + 14) {
    start.setDate(startDay);
  } else if (dom >= startDay + 14) {
    start.setDate(startDay + 14);
  } else {
    start.setMonth(start.getMonth() - 1);
    start.setDate(startDay + 14);
  }
  const end = new Date(start);
  end.setDate(start.getDate() + 13);
  return { start, end };
}
function getUpcomingBills(days = 60) {
  const today = new Date(); today.setHours(0,0,0,0);
  const result = [];

  budgetData.bills.forEach(bill => {
    if (bill.type === 'variable') return; // variable has no date

    const freq = bill.frequency || 'monthly';

    if (freq === 'monthly' && bill.dayOfMonth) {
      // Show every month within range
      for (let m = -1; m <= 3; m++) {
        const d = new Date(today.getFullYear(), today.getMonth() + m, parseInt(bill.dayOfMonth));
        const diff = Math.round((d - today) / 86400000);
        if (diff >= 0 && diff < days) {
          result.push({ ...bill, date: d.toISOString().split('T')[0], daysUntil: diff });
        }
      }
    } else if (bill.nextDate) {
      // Irregular frequency — use nextDate and project forward
      let next = new Date(bill.nextDate + 'T12:00:00');
      let attempts = 0;
      while (attempts < 20) {
        attempts++;
        const diff = Math.round((next - today) / 86400000);
        if (diff < 0) {
          // Advance to next occurrence
          next = advanceBillDate(next, freq);
          continue;
        }
        if (diff >= days) break;
        result.push({ ...bill, date: next.toISOString().split('T')[0], daysUntil: diff });
        next = advanceBillDate(next, freq);
      }
    }
  });

  return result.sort((a,b) => a.daysUntil - b.daysUntil);
}

function advanceBillDate(date, freq) {
  const d = new Date(date);
  if (freq === 'fortnightly')  { d.setDate(d.getDate() + 14); }
  else if (freq === 'quarterly')  { d.setMonth(d.getMonth() + 3); }
  else if (freq === 'halfyearly') { d.setMonth(d.getMonth() + 6); }
  else if (freq === 'yearly')     { d.setFullYear(d.getFullYear() + 1); }
  else { d.setMonth(d.getMonth() + 1); } // monthly fallback
  return d;
}

// ── RENDER ────────────────────────────────────────────────────
function renderBudget() {
  const body = document.getElementById('budgetBody');
  if (!body) return;
  const totalIncome = getTotalIncome();
  const totalBills  = getTotalBills();
  const leftover    = totalIncome - totalBills;
  const totalAlloc  = budgetData.allocations.reduce((a,al) => a + (parseFloat(al.percent)||0), 0);
  const pct = totalIncome > 0 ? Math.round((totalBills/totalIncome)*100) : 0;

  let tabHtml = '';
  if (budgetTab === 'overview') tabHtml = renderBudgetOverview(totalIncome, totalBills, leftover, pct);
  else if (budgetTab === 'bills') tabHtml = renderBudgetBills();
  else if (budgetTab === 'savings') tabHtml = renderBudgetSavings(leftover);
  else if (budgetTab === 'debt') tabHtml = renderBudgetDebt();
  else if (budgetTab === 'history') tabHtml = renderBudgetHistory();
  body.innerHTML = `<div class="budget-content">${tabHtml}</div>`;

  // Draw projection chart if on overview
  if (budgetTab === 'overview') {
    setTimeout(() => drawProjectionChart(), 50);
  }
}

function renderBudgetOverview(totalIncome, totalBills, leftover, pct) {
  const upcoming = getUpcomingBills(14);
  const color = leftover >= 0 ? 'var(--low)' : 'var(--high)';
  const barColor = pct > 90 ? '#f05d5d' : pct > 70 ? '#f0b84d' : '#4dcf8e';

  const totalVariable = getTotalVariable();
  const totalSavingsC = getTotalSavingsContrib();
  const totalDebtPay  = getTotalDebtPayments();
  const trueLeftover  = leftover - totalVariable - totalSavingsC - totalDebtPay;
  const trueColor     = trueLeftover >= 0 ? 'var(--low)' : 'var(--high)';

function renderBillsCalendar() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = today.toLocaleString('en-AU',{month:'long',year:'numeric'});

  // Build bill/income day map
  const billDays = new Set(budgetData.bills.map(b => parseInt(b.dayOfMonth)));
  // Calculate which days this month are pay days (every 14 days from startDay)
  const startDay = budgetData.fortnightStartDay || 1;
  const incomeDays = new Set();
  const refPay = new Date(today.getFullYear(), today.getMonth() - 1, startDay);
  for (let d2 = new Date(refPay); d2 <= new Date(today.getFullYear(), today.getMonth(), daysInMonth+1); d2.setDate(d2.getDate()+14)) {
    if (d2.getMonth() === today.getMonth()) incomeDays.add(d2.getDate());
  }

  let cal = `<div class="budget-calendar">
    <div class="budget-cal-header"><span class="budget-cal-title">${monthName}</span></div>
    <div class="budget-cal-grid">
      ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="budget-cal-day-label">${d}</div>`).join('')}
      ${Array(firstDay).fill('<div></div>').join('')}
      ${Array.from({length:daysInMonth},(_,i)=>{
        const d = i+1;
        const isToday = d === today.getDate();
        const hasBill = billDays.has(d);
        const hasInc  = incomeDays.has(d);
        const cls = isToday?'today':hasBill&&hasInc?'has-both':hasBill?'has-bill':hasInc?'has-income':'';
        const bills = budgetData.bills.filter(b=>parseInt(b.dayOfMonth)===d);
        const tip = bills.map(b=>b.name+' '+fmtAUD(b.amount)).join(', ');
        return `<div class="budget-cal-cell ${cls}" title="${tip}">
          <div>${d}</div>
          ${hasBill?`<div class="budget-cal-dot" style="background:var(--high)"></div>`:''}
          ${hasInc?`<div class="budget-cal-dot" style="background:var(--low)"></div>`:''}
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--text3)">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--high);margin-right:4px"></span>Bill due</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--low);margin-right:4px"></span>Income</span>
    </div>
  </div>`;
  return cal;
}

function getAllocAmount(al, leftover) {
  if (al.amountType === 'fixed') return parseFloat(al.fixedAmount)||0;
  return leftover * ((parseFloat(al.percent)||0)/100);
}
function getAllocPct(al, leftover) {
  if (al.amountType === 'fixed') return leftover > 0 ? Math.round(((parseFloat(al.fixedAmount)||0)/leftover)*100) : 0;
  return parseFloat(al.percent)||0;
}

      ${unallocated > 0 ? `<div style="font-size:12px;color:var(--text3);margin-top:8px;font-family:'JetBrains Mono',monospace">Unallocated: ${fmtAUD(unallocated)} (${100-totalPct}%)</div>` : ''}

function getFortnightsToDate(targetDate) {
  if (!targetDate) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const end = new Date(targetDate + 'T12:00:00');
  const days = Math.round((end - today) / 86400000);
  if (days <= 0) return 0;
  return Math.floor(days / 14);
}

function getRequiredContribution(g) {
  if (!g.targetDate) return null;
  const remaining = Math.max((g.target||0) - (g.current||0), 0);
  const fortnights = getFortnightsToDate(g.targetDate);
  if (!fortnights || fortnights <= 0) return null;
  return remaining / fortnights;
}

function saveDebt() {
  const name  = document.getElementById('debtName').value.trim();
  const total = parseFloat(document.getElementById('debtTotal').value)||0;
  const current = parseFloat(document.getElementById('debtCurrent').value)||0;
  const payFn = parseFloat(document.getElementById('debtPayFn').value)||0;
  const color = document.getElementById('debtColor').value;
  if (!name) { document.getElementById('debtName').focus(); return; }
  if (!budgetData.debts) budgetData.debts = [];
  if (currentDebtEdit) {
    const d = budgetData.debts.find(d=>d.id===currentDebtEdit);
    if (d) { d.name=name; d.total=total; d.current=current; d.payPerFortnight=payFn; d.color=color; }
  } else {
    budgetData.debts.push({id:uid(),name,total,current,payPerFortnight:payFn,color,payments:[]});
  }
  saveBudget(); closeDebtModal(); renderBudget(); showToast('Debt saved ✓');
}
function deleteDebt(id) {
  if (!confirm('Delete this debt?')) return;
  budgetData.debts = (budgetData.debts||[]).filter(d=>d.id!==id);
  saveBudget(); renderBudget();
}
function logDebtPayment(debtId) {
  const amtEl  = document.getElementById('debtPay_'  + debtId);
  const noteEl = document.getElementById('debtNote_' + debtId);
  if (!amtEl) return;
  const amount = parseFloat(amtEl.value);
  if (!amount || amount <= 0) return;
  const note = noteEl?.value.trim() || 'Payment';
  const d = (budgetData.debts||[]).find(d=>d.id===debtId);
  if (!d) return;
  if (!d.payments) d.payments = [];
  d.payments.push({ id:uid(), date:getTodayDate(), amount, note });
  d.current = Math.max((d.current||0) - amount, 0);
  amtEl.value = ''; if (noteEl) noteEl.value = '';
  saveBudget(); renderBudget(); showToast(fmtAUD(amount) + ' logged ✓');
}
function deleteDebtPayment(debtId, payId) {
  const d = (budgetData.debts||[]).find(d=>d.id===debtId);
  if (!d) return;
  const pay = (d.payments||[]).find(p=>p.id===payId);
  if (pay) d.current = Math.min((d.current||0) + pay.amount, d.total||0);
  d.payments = (d.payments||[]).filter(p=>p.id!==payId);
  saveBudget(); renderBudget();
}

// ── PROJECTION CHART ─────────────────────────────────────────
function setProjDays(days) {
  budgetData.projDays = days;
  saveBudget();
  renderBudget();
}

function drawProjectionChart() {
  const canvas = document.getElementById('projCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth; const H = canvas.offsetHeight;
  canvas.width = W; canvas.height = H;

  const totalIncome = getTotalIncome();
  const totalBills  = getTotalBills();
  const today = new Date();

  const projDays = budgetData.projDays || 90;
  const points = [];
  // Pre-calculate total sinking fund deduction per fortnight
  const totalSinkingPerFn = getTotalBills() + getTotalVariable() + getTotalSavingsContrib();

  let balance = budgetData.currentBalance || 0;
  for (let i = 0; i < projDays + 1; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    // Add fortnightly income — every 14 days from the set start date
    const startDay = budgetData.fortnightStartDay || 1;
    const refDate = new Date(today.getFullYear(), today.getMonth(), startDay);
    while (refDate > d) refDate.setDate(refDate.getDate() - 14);
    const daysSinceRef = Math.round((d - refDate) / 86400000);
    if (daysSinceRef % 14 === 0) {
      balance += totalIncome;
      // Deduct all bills as sinking fund amounts each pay
      balance -= totalSinkingPerFn;
    }
    points.push({ day: i, balance, date: d.toISOString().split('T')[0] });
  }

  const minB = Math.min(...points.map(p=>p.balance), 0);
  const maxB = Math.max(...points.map(p=>p.balance), 1000);
  const range = maxB - minB || 1;
  const pad = { t:20, r:20, b:30, l:70 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  ctx.clearRect(0,0,W,H);

  // Zero line
  const zeroY = pad.t + ch * (1 - (0 - minB)/range);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(pad.l, zeroY); ctx.lineTo(W-pad.r, zeroY); ctx.stroke();
  ctx.setLineDash([]);

  // Fill gradient
  const grad = ctx.createLinearGradient(0, pad.t, 0, H-pad.b);
  grad.addColorStop(0, 'rgba(77,207,142,0.3)');
  grad.addColorStop(1, 'rgba(77,207,142,0.02)');

  ctx.beginPath();
  points.forEach((p,i) => {
    const x = pad.l + (p.day/projDays)*cw;
    const y = pad.t + ch*(1-(p.balance-minB)/range);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.l+cw, H-pad.b);
  ctx.lineTo(pad.l, H-pad.b);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#4dcf8e';
  ctx.lineWidth = 2;
  points.forEach((p,i) => {
    const x = pad.l + (p.day/projDays)*cw;
    const y = pad.t + ch*(1-(p.balance-minB)/range);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Y labels
  ctx.fillStyle = 'rgba(138,146,164,0.8)';
  ctx.font = '10px JetBrains Mono';
  ctx.textAlign = 'right';
  [0,0.25,0.5,0.75,1].forEach(t => {
    const val = minB + range*t;
    const y = pad.t + ch*(1-t);
    ctx.fillText('$'+Math.round(val).toLocaleString(), pad.l-6, y+4);
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
  });

  // X labels
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(138,146,164,0.8)';
  const labelCount = projDays <= 90 ? 4 : projDays <= 180 ? 6 : projDays <= 365 ? 12 : 8;
  for (let li = 0; li <= labelCount; li++) {
    const day = Math.round((li / labelCount) * projDays);
    const d = new Date(today); d.setDate(today.getDate() + day);
    const lbl = d.toLocaleString('en-AU', projDays > 365 ? {month:'short',year:'2-digit'} : {month:'short',day:'numeric'});
    const x = pad.l + (day/projDays)*cw;
    ctx.fillText(lbl, x, H-6);
  }
}

// Bills


let currentBillEmoji = '💰';
const BILL_EMOJIS = ['🏠','🚗','📱','💡','💧','🛒','🍔','☕','🎬','🎮','✈️','🏥','📚','👕','💈','🐾','🏋️','🎵','💳','🏦','📺','🌐','🔑','🧾','💊','🧴','🛁','🎁','⚡','🔒','💰'];

// Build emoji picker once on load
document.addEventListener('DOMContentLoaded', () => {
  const picker = document.getElementById('billEmojiPicker');
  if (!picker) return;
  // Use event delegation — one listener, not 30
  picker.innerHTML = BILL_EMOJIS.map(em =>
    `<span class="epick-btn" data-emoji="${em}" style="cursor:pointer;font-size:20px;padding:4px;border-radius:4px;line-height:1;display:inline-block">${em}</span>`
  ).join('');
  picker.addEventListener('click', e => {
    const btn = e.target.closest('.epick-btn');
    if (btn) selectBillEmoji(btn.dataset.emoji);
  });
  picker.addEventListener('mouseover', e => {
    const btn = e.target.closest('.epick-btn');
    if (btn) btn.style.background = 'var(--border)';
  });
  picker.addEventListener('mouseout', e => {
    const btn = e.target.closest('.epick-btn');
    if (btn) btn.style.background = 'none';
  });
});

function toggleBillEmojiPicker(e) {
  if (e) e.stopPropagation();
  const picker = document.getElementById('billEmojiPicker');
  if (!picker) return;
  if (picker.style.display !== 'none') { picker.style.display = 'none'; return; }
  // Position near the emoji button
  const btn = document.getElementById('billEmojiBtn');
  if (btn) {
    const rect = btn.getBoundingClientRect();
    picker.style.top  = (rect.bottom + 6) + 'px';
    picker.style.left = rect.left + 'px';
  }
  picker.style.display = 'flex';
}
function selectBillEmoji(emoji) {
  currentBillEmoji = emoji;
  const btn = document.getElementById('billEmojiBtn');
  if (btn) btn.textContent = emoji;
  const picker = document.getElementById('billEmojiPicker');
  if (picker) picker.style.display = 'none';
}
// Close picker when clicking outside
document.addEventListener('click', e => {
  const picker = document.getElementById('billEmojiPicker');
  if (picker && !picker.contains(e.target) && e.target.id !== 'billEmojiBtn') {
    picker.style.display = 'none';
  }
});


function updateBillFreqFields() {
  const freq = document.getElementById('billFrequency')?.value || 'monthly';
  const dayGroup  = document.getElementById('billDayGroup');
  const nextGroup = document.getElementById('billNextDateGroup');
  if (!dayGroup || !nextGroup) return;
  if (freq === 'monthly' || freq === 'fortnightly') {
    dayGroup.style.display  = freq === 'monthly' ? 'block' : 'none';
    nextGroup.style.display = freq === 'fortnightly' ? 'block' : 'none';
  } else {
    // quarterly, halfyearly, yearly — need next date
    dayGroup.style.display  = 'none';
    nextGroup.style.display = 'block';
  }
}

let currentBillType = 'fixed';
function setBillType(type) {
  currentBillType = type;
  const fixedBtn = document.getElementById('billTypeFixed');
  const varBtn   = document.getElementById('billTypeVariable');
  const dayGroup = document.getElementById('billDayGroup');
  if (type === 'fixed') {
    fixedBtn.style.background='var(--high-bg)'; fixedBtn.style.borderColor='var(--high)'; fixedBtn.style.color='var(--high)';
    varBtn.style.background='var(--bg3)'; varBtn.style.borderColor='var(--border)'; varBtn.style.color='var(--text3)';
    if (dayGroup) dayGroup.style.display='block';
  } else {
    varBtn.style.background='var(--med-bg)'; varBtn.style.borderColor='var(--med)'; varBtn.style.color='var(--med)';
    fixedBtn.style.background='var(--bg3)'; fixedBtn.style.borderColor='var(--border)'; fixedBtn.style.color='var(--text3)';
    if (dayGroup) dayGroup.style.display='none';
  }
}

function openBillModal(id) {
  currentBillEdit=id||null;
  const b=id?budgetData.bills.find(b=>b.id===id):null;
  document.getElementById('budgetBillModal').style.display='flex';
  document.getElementById('billName').value    =b?.name||'';
  currentBillEmoji = b?.emoji||'💰';
  const emojiBtn = document.getElementById('billEmojiBtn');
  if (emojiBtn) emojiBtn.textContent = currentBillEmoji;
  document.getElementById('billAmount').value  =b?.amount||'';
  document.getElementById('billDay').value     =b?.dayOfMonth||'1';
  document.getElementById('billCategory').value=b?.category||'';
  setTimeout(()=>{ setBillType(b?.type||'fixed'); updateBillFreqFields(); document.getElementById('billName').focus(); },50);
}
function closeBillModal(){document.getElementById('budgetBillModal').style.display='none';}
function editBill(id){openBillModal(id);}
function saveBill(){
  const name=document.getElementById('billName').value.trim();
  const amount=document.getElementById('billAmount').value;
  const day=document.getElementById('billDay').value;
  const category=document.getElementById('billCategory').value.trim();
  const type=currentBillType||'fixed';
  if(!name||!amount){showToast('Fill in all fields');return;}
  if(currentBillEdit){
    const b=budgetData.bills.find(b=>b.id===currentBillEdit);
    const freq2=document.getElementById('billFrequency')?.value||'monthly';
    const nextDt=document.getElementById('billNextDate')?.value||null;
    if(b){b.name=name;b.amount=parseFloat(amount);b.dayOfMonth=(type==='fixed'&&freq2==='monthly')?parseInt(day):null;b.nextDate=(type==='fixed'&&freq2!=='monthly')?nextDt:null;b.frequency=type==='fixed'?freq2:'variable';b.category=category;b.type=type;b.emoji=currentBillEmoji;}
  } else {
    const freq3=document.getElementById('billFrequency')?.value||'monthly';
    const nextDt2=document.getElementById('billNextDate')?.value||null;
    budgetData.bills.push({id:uid(),name,amount:parseFloat(amount),dayOfMonth:(type==='fixed'&&freq3==='monthly')?parseInt(day):null,nextDate:(type==='fixed'&&freq3!=='monthly')?nextDt2:null,frequency:type==='fixed'?freq3:'variable',category,type,emoji:currentBillEmoji});
  }
  saveBudget();closeBillModal();renderBudget();showToast('Bill saved ✓');
}
function deleteBill(id){
  if(!confirm('Delete this bill?'))return;
  budgetData.bills=budgetData.bills.filter(b=>b.id!==id);
  saveBudget();renderBudget();
}

// Allocations
function openAllocModal(id){
  currentAllocEdit=id||null;
  const al=id?budgetData.allocations.find(a=>a.id===id):null;
  document.getElementById('budgetAllocModal').style.display='flex';
  document.getElementById('allocName').value   =al?.name||'';
  document.getElementById('allocPercent').value=al?.percent||'';
  document.getElementById('allocFixed').value  =al?.fixedAmount||'';
  document.getElementById('allocColor').value  =al?.color||'#4f8ef7';
  const typeRadio = document.querySelector(`input[name="allocAmtType"][value="${al?.amountType||'percent'}"]`);
  if (typeRadio) { typeRadio.checked=true; toggleAllocType(al?.amountType||'percent'); }
  setTimeout(()=>document.getElementById('allocName').focus(),50);
}
function toggleAllocType(type) {
  document.getElementById('allocPercentGroup').style.display = type==='percent'?'block':'none';
  document.getElementById('allocFixedGroup').style.display   = type==='fixed'?'block':'none';
}
function closeAllocModal(){document.getElementById('budgetAllocModal').style.display='none';}
function editAlloc(id){openAllocModal(id);}
function saveAlloc(){
  const name=document.getElementById('allocName').value.trim();
  const amtType=document.querySelector('input[name="allocAmtType"]:checked')?.value||'percent';
  const pct=document.getElementById('allocPercent').value;
  const fixed=document.getElementById('allocFixed').value;
  const color=document.getElementById('allocColor').value;
  if(!name||(amtType==='percent'&&!pct)||(amtType==='fixed'&&!fixed)){showToast('Fill in all fields');return;}
  const data={name,amountType:amtType,percent:amtType==='percent'?parseFloat(pct):0,fixedAmount:amtType==='fixed'?parseFloat(fixed):0,color};
  if(currentAllocEdit){
    const al=budgetData.allocations.find(a=>a.id===currentAllocEdit);
    if(al){Object.assign(al,data);}
  } else {
    budgetData.allocations.push({id:uid(),...data});
  }
  saveBudget();closeAllocModal();renderBudget();showToast('Allocation saved ✓');
}
function deleteAlloc(id){
  if(!confirm('Delete this allocation?'))return;
  budgetData.allocations=budgetData.allocations.filter(a=>a.id!==id);
  saveBudget();renderBudget();
}


// Savings Goals
let currentSavingsEdit = null;
function openSavingsModal(id) {
  currentSavingsEdit = id || null;
  const g = id ? (budgetData.savingsGoals||[]).find(g=>g.id===id) : null;
  document.getElementById('budgetSavingsModal').style.display = 'flex';
  document.getElementById('savingsName').value        = g?.name||'';
  document.getElementById('savingsTarget').value      = g?.target||'';
  document.getElementById('savingsCurrent').value     = g?.current||'0';
  document.getElementById('savingsContrib').value     = g?.contribution||'';
  document.getElementById('savingsColor').value       = g?.color||'#4f8ef7';
  setTimeout(()=>document.getElementById('savingsName').focus(),50);
}
function closeSavingsModal() { document.getElementById('budgetSavingsModal').style.display='none'; }
function editSavingsGoal(id) { openSavingsModal(id); }
function saveSavingsGoal() {
  const name = document.getElementById('savingsName').value.trim();
  const target = parseFloat(document.getElementById('savingsTarget').value)||0;
  const current = parseFloat(document.getElementById('savingsCurrent').value)||0;
  const contribution = parseFloat(document.getElementById('savingsContrib').value)||0;
  const targetDate   = document.getElementById('savingsTargetDate').value || null;
  const color = document.getElementById('savingsColor').value;
  if (!name) { document.getElementById('savingsName').focus(); return; }
  if (!budgetData.savingsGoals) budgetData.savingsGoals = [];
  if (currentSavingsEdit) {
    const g = budgetData.savingsGoals.find(g=>g.id===currentSavingsEdit);
    if (g) { g.name=name; g.target=target; g.current=current; g.contribution=contribution; g.targetDate=targetDate; g.color=color; }
  } else {
    budgetData.savingsGoals.push({id:uid(),name,target,current,contribution,targetDate,color});
  }
  saveBudget(); closeSavingsModal(); renderBudget(); showToast('Savings goal saved ✓');
}
function deleteSavingsGoal(id) {
  if (!confirm('Delete this savings goal?')) return;
  budgetData.savingsGoals = (budgetData.savingsGoals||[]).filter(g=>g.id!==id);
  saveBudget(); renderBudget();
}
function addToSavings(goalId) {
  const inp = document.getElementById('savingsAdd_' + goalId);
  if (!inp) return;
  const amount = parseFloat(inp.value);
  if (!amount || amount <= 0) return;
  const g = (budgetData.savingsGoals||[]).find(g=>g.id===goalId);
  if (!g) return;
  g.current = (g.current||0) + amount;
  inp.value = '';
  // Log as transaction
  budgetData.transactions.push({id:uid(),name:'Savings: '+g.name,amount,date:getTodayDate(),type:'expense',category:'Savings'});
  saveBudget(); renderBudget(); showToast(fmtAUD(amount) + ' added to ' + g.name + ' ✓');
}

// Transactions
function openTransactionModal(){
  document.getElementById('budgetTransModal').style.display='flex';
  document.getElementById('transName').value='';
  document.getElementById('transAmount').value='';
  document.getElementById('transDate').value=getTodayDate();
  document.getElementById('transType').value='expense';
  document.getElementById('transCat').value='';
  setTimeout(()=>document.getElementById('transName').focus(),50);
}
function closeTransModal(){document.getElementById('budgetTransModal').style.display='none';}
function saveTransaction(){
  const name=document.getElementById('transName').value.trim();
  const amount=document.getElementById('transAmount').value;
  const date=document.getElementById('transDate').value;
  const type=document.getElementById('transType').value;
  const category=document.getElementById('transCat').value.trim();
  if(!name||!amount){showToast('Fill in all fields');return;}
  budgetData.transactions.push({id:uid(),name,amount:parseFloat(amount),date,type,category});
  saveBudget();closeTransModal();renderBudget();showToast('Transaction logged ✓');
}
function deleteTransaction(id){
  budgetData.transactions=budgetData.transactions.filter(t=>t.id!==id);
  saveBudget();renderBudget();
}

// Fortnight start day setting
function saveFortnightStart(){
  const day=parseInt(document.getElementById('fortnightStartDay').value);
  if(day>=1&&day<=28){budgetData.fortnightStartDay=day;saveBudget();renderBudget();showToast('Pay day updated ✓');}
}


// ── LOGIN GATE ────────────────────────────────────────────────
function budgetLogin() {
  const user = document.getElementById('lgUsername').value.trim();
  const secret = document.getElementById('lgSecret').value.trim();
  if (!user || !secret) { alert('Enter username and secret'); return; }
  localStorage.setItem('wtm_username', user);
  localStorage.setItem('wtm_secret', secret);
  initBudgetApp();
}

function initBudgetApp() {
  const user = getUserId();
  const secret = getAppSecret();
  if (!user || !secret) {
    document.getElementById('loginGate').style.display = 'flex';
    document.getElementById('budgetApp').style.display = 'none';
    return;
  }
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('budgetApp').style.display = 'flex';
  loadBudgetFromCloud();
}

// Escape closes modals
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeIncomeModal && closeIncomeModal();
    closeBillModal && closeBillModal();
    closeAllocModal && closeAllocModal();
    closeTransModal && closeTransModal();
    closeSavingsModal && closeSavingsModal();
    closeDebtModal && closeDebtModal();
  }
});

// Close emoji picker on outside click
document.addEventListener('click', e => {
  const picker = document.getElementById('billEmojiPicker');
  if (picker && !picker.contains(e.target) && e.target.id !== 'billEmojiBtn') {
    picker.style.display = 'none';
  }
});

initBudgetApp();
</script>
